<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ระบบอนุมัติ - Property Pass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .img-preview { cursor: pointer; transition: transform 0.2s; border: 1px solid #e2e8f0; }
        .img-preview:active { transform: scale(0.95); }
        .task-card { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mb-4"></div>
        <p class="text-gray-600 font-semibold">กำลังประมวลผล...</p>
    </div>

    <header class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-bold text-lg">ระบบอนุมัติย้ายสิ่งของ</h1>
                <p id="approverDisplay" class="text-xs opacity-80">รอเข้าสู่ระบบ...</p>
            </div>
            <img id="userImg" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" src="https://via.placeholder.com/40">
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- Section 0: Registration Form -->
        <div id="regSection" class="hidden bg-white rounded-2xl shadow-xl p-6 mt-10">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-shield text-4xl text-blue-600"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">ลงทะเบียนผู้อนุมัติ</h2>
                <p class="text-gray-500 text-sm">กรุณาระบุรหัสผ่านและอีเมลเพื่อยืนยันตัวตน</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">รหัสผ่าน (Profile Code)</label>
                    <input type="password" id="regPass" class="w-full p-4 border rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50" placeholder="ระบุรหัสประจำตัวของคุณ">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">อีเมลสำหรับรับแจ้งเตือน</label>
                    <input type="email" id="regEmail" class="w-full p-4 border rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50" placeholder="yourname@hrientec.com">
                </div>
                <button onclick="register()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all mt-4">
                    <i class="fas fa-id-card mr-2"></i> ลงทะเบียนสวมสิทธิ์
                </button>
            </div>
        </div>

        <!-- Section 1: Approval Card -->
        <div id="approvalSection" class="hidden space-y-4">
            <div id="taskContent" class="space-y-4">
                <!-- Data will be injected here -->
            </div>
            
            <div id="noTask" class="hidden text-center py-20">
                <div class="bg-green-100 text-green-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-check-double text-3xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800">ตรวจสอบเรียบร้อยแล้ว</h3>
                <p class="text-gray-500">ไม่มีรายการรออนุมัติที่ตรงกับชื่อของคุณ</p>
                <button onclick="fetchTask()" class="mt-6 bg-white border-2 border-blue-600 text-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-50 transition">
                    <i class="fas fa-sync-alt mr-2"></i> รีเฟรชข้อมูล
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKMwydsv1JPPjN0SNWKsWg3FFnmFuIMppjbJG_F75ssy49WHFcyKqGQE2RFyyLtzPs/exec'; 
        const LIFF_ID = '2009016720-UwO1laLB'; 
        
        let currentUser = {
            lineUid: '',
            displayName: '',
            approverName: ''
        };

        async function init() {
            showLoading(true);
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                currentUser.lineUid = profile.userId;
                currentUser.displayName = profile.displayName;
                document.getElementById('userImg').src = profile.pictureUrl;

                await checkUser();
            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อ LINE ได้: ' + err, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function checkUser() {
            const res = await callApi({ action: 'checkUser', lineUid: currentUser.lineUid });
            if (res.status === 'found') {
                currentUser.approverName = res.approverName;
                document.getElementById('approverDisplay').innerText = `ผู้อนุมัติ: ${res.approverName}`;
                document.getElementById('regSection').classList.add('hidden');
                document.getElementById('approvalSection').classList.remove('hidden');
                fetchTask();
            } else {
                document.getElementById('regSection').classList.remove('hidden');
            }
        }

        async function register() {
            const pass = document.getElementById('regPass').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            if (!pass || !email) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'warning');

            showLoading(true);
            const res = await callApi({
                action: 'register',
                lineUid: currentUser.lineUid,
                password: pass,
                email: email,
                displayName: currentUser.displayName
            });
            showLoading(false);

            if (res.status === 'success') {
                Swal.fire({
                    icon: 'success',
                    title: 'ลงทะเบียนสำเร็จ',
                    text: `ยินดีต้อนรับคุณ ${res.approverName}`,
                    timer: 2000
                }).then(checkUser);
            } else {
                Swal.fire('ล้มเหลว', res.message || 'รหัสผ่านไม่ถูกต้อง', 'error');
            }
        }

        async function fetchTask() {
            showLoading(true);
            const res = await callApi({ action: 'getPendingTask', approverName: currentUser.approverName });
            showLoading(false);

            const container = document.getElementById('taskContent');
            const emptyState = document.getElementById('noTask');
            
            if (res.status === 'success' && res.data) {
                container.classList.remove('hidden');
                emptyState.classList.add('hidden');
                renderTask(res.data);
            } else {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

        function renderTask(task) {
            const container = document.getElementById('taskContent');
            
            let itemsHtml = task.details.map((item, idx) => {
                // ใช้ URL สำหรับขยายรูป (uc?id=...) และ Thumb (thumbnail?id=...)
                const thumbUrl = item.photoId ? `https://drive.google.com/thumbnail?id=${item.photoId}&sz=w400` : '';
                
                return `
                <div class="p-3 bg-white rounded-xl border border-gray-100 shadow-sm space-y-3">
                    <div class="flex items-center space-x-3">
                        <div class="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm flex-shrink-0">
                            ${item.qty}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-gray-800 truncate">${item.description}</p>
                            <p class="text-[10px] text-gray-500 italic">เจ้าของทรัพย์สิน: ${item.owner}</p>
                        </div>
                    </div>
                    ${item.photoId ? `
                        <div class="relative w-full h-48 bg-gray-100 rounded-lg overflow-hidden group border border-gray-200">
                            <img src="${thumbUrl}" 
                                 class="w-full h-full object-cover img-preview" 
                                 onclick="previewFullImage('${item.photoId}')"
                                 onerror="this.src='https://via.placeholder.com/400x300?text=รูปภาพไม่รองรับหรือถูกลบ'">
                            <div class="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-active:opacity-100 transition-opacity">
                                <i class="fas fa-search-plus text-white text-3xl"></i>
                            </div>
                            <div class="absolute bottom-2 right-2 bg-black/60 text-white px-2 py-1 rounded text-[9px] font-bold">
                                <i class="fas fa-expand-arrows-alt mr-1"></i> แตะเพื่อขยายรูปภาพ
                            </div>
                        </div>
                    ` : `
                        <div class="py-4 bg-gray-50 rounded-lg text-[10px] text-gray-400 text-center border-2 border-dashed border-gray-100">
                            <i class="fas fa-image-slash mb-1 block text-lg"></i> ไม่มีรูปภาพประกอบ
                        </div>
                    `}
                </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="task-card bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                    <div class="bg-gradient-to-r from-blue-800 to-blue-900 p-4 text-white">
                        <div class="flex justify-between items-center mb-1">
                            <h2 class="text-xs bg-blue-500/50 px-2 py-0.5 rounded-full font-bold">DOC: ${task.docno}</h2>
                            <span class="text-[10px] opacity-80"><i class="far fa-calendar-alt mr-1"></i>${task.docdate}</span>
                        </div>
                        <p class="text-lg font-bold mt-1">${task.transType}</p>
                    </div>
                    
                    <div class="p-4 space-y-4">
                        <div class="grid grid-cols-2 gap-x-4 gap-y-3 text-sm">
                            <div><label class="text-gray-400 text-[9px] uppercase font-bold block mb-0.5">ชื่อผู้ขอ</label><p class="font-bold text-gray-800">${task.reqName}</p></div>
                            <div><label class="text-gray-400 text-[9px] uppercase font-bold block mb-0.5">บริษัท/แผนก</label><p class="font-bold text-gray-800">${task.reqCompany}</p></div>
                            <div><label class="text-gray-400 text-[9px] uppercase font-bold block mb-0.5">ทะเบียนรถ</label><p class="font-bold text-gray-800">${task.carNo}</p></div>
                            <div><label class="text-gray-400 text-[9px] uppercase font-bold block mb-0.5">ประเภทรถ</label><p class="font-bold text-gray-800">${task.carType}</p></div>
                            <div class="col-span-2 bg-gray-50 p-3 rounded-lg border-l-4 border-gray-200">
                                <label class="text-gray-400 text-[9px] uppercase font-bold block mb-1">วัตถุประสงค์การเคลื่อนย้าย</label>
                                <p class="text-gray-700 text-sm leading-relaxed">${task.purpose}</p>
                            </div>
                        </div>
                        
                        <div class="pt-4">
                            <h4 class="text-xs font-black text-blue-900 mb-3 uppercase flex items-center">
                                <i class="fas fa-clipboard-list mr-2"></i> รายการสิ่งของ (${task.details.length})
                            </h4>
                            <div class="space-y-4">${itemsHtml}</div>
                        </div>
                    </div>
                    
                    <div class="p-4 bg-gray-50 border-t grid grid-cols-2 gap-3">
                        <button onclick="approveAction('${task.docno}', 'Rejected')" class="bg-white border-2 border-red-500 text-red-600 font-bold py-4 rounded-2xl active:scale-95 transition-all shadow-sm">
                            <i class="fas fa-times-circle mr-2"></i> ไม่อนุมัติ
                        </button>
                        <button onclick="approveAction('${task.docno}', 'Approved')" class="bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                            <i class="fas fa-check-circle mr-2"></i> อนุมัติ
                        </button>
                    </div>
                </div>
            `;
        }

        // ฟังก์ชันขยายรูปภาพ - ปรับปรุง URL ให้แสดงผลได้ดีขึ้น
        function previewFullImage(id) {
            Swal.fire({
                imageUrl: `https://drive.google.com/uc?export=view&id=${id}`,
                imageAlt: 'Property Image',
                showConfirmButton: false,
                showCloseButton: true,
                width: '100%',
                padding: '0',
                background: 'rgba(0,0,0,0.85)',
                imageWidth: 'auto',
                imageHeight: 'auto',
                backdrop: true,
                customClass: {
                    image: 'max-w-full h-auto rounded-lg'
                }
            });
        }

        async function approveAction(docno, status) {
            const isApproved = status === 'Approved';
            const result = await Swal.fire({
                title: isApproved ? 'ยืนยันอนุมัติ?' : 'ไม่รับรองรายการ?',
                text: `คุณกำลังตัดสินใจ ${isApproved ? 'อนุมัติ' : 'ไม่อนุมัติ'} รายการเลขที่ ${docno}`,
                icon: isApproved ? 'success' : 'warning',
                showCancelButton: true,
                confirmButtonColor: isApproved ? '#059669' : '#dc2626',
                cancelButtonText: 'ย้อนกลับ',
                confirmButtonText: 'ยืนยัน',
                reverseButtons: true
            });

            if (result.isConfirmed) {
                showLoading(true);
                const res = await callApi({ action: 'processApproval', docno, status });
                showLoading(false);
                if (res.status === 'success') {
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'ดำเนินการเรียบร้อย', 
                        showConfirmButton: false, 
                        timer: 1500,
                        toast: true,
                        position: 'top-end'
                    });
                    fetchTask();
                } else {
                    Swal.fire('ล้มเหลว', res.message || 'บันทึกไม่สำเร็จ', 'error');
                }
            }
        }

        async function callApi(payload) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                console.error(err);
                return { status: 'error', message: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้' };
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
