<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ป้องกันการจำค่า Cache เพื่อให้ข้อมูลอัปเดตเสมอ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>ระบบอนุมัติ - Property Pass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        /* ปรับแต่งให้แสดงภาพเต็มโดยไม่โดน Crop */
        .img-contain {
            width: 100%;
            height: 100%;
            object-fit: contain; /* แสดงภาพเต็มขนาดในกรอบ */
            background-color: #f3f4f6;
            cursor: pointer;
        }
        .task-card { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mb-4"></div>
        <p class="text-gray-600 font-semibold text-sm">กำลังโหลดข้อมูล...</p>
    </div>

    <header class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-bold text-lg">ระบบอนุมัติย้ายสิ่งของ</h1>
                <p id="approverDisplay" class="text-[10px] opacity-80">ตรวจสอบสิทธิ์การเข้าใช้งาน...</p>
            </div>
            <img id="userImg" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" src="https://via.placeholder.com/40">
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- Section 0: Registration Form -->
        <div id="regSection" class="hidden bg-white rounded-2xl shadow-xl p-6 mt-10">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-shield text-3xl text-blue-600"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">ลงทะเบียนผู้อนุมัติ</h2>
                <p class="text-gray-500 text-xs">ระบุรหัสประจำตัวและอีเมลเพื่อยืนยันสวมสิทธิ์</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">รหัสผ่าน (Profile Code)</label>
                    <input type="password" id="regPass" class="w-full p-4 border rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-mono" placeholder="••••••">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">อีเมลแจ้งเตือน</label>
                    <input type="email" id="regEmail" class="w-full p-4 border rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50" placeholder="yourname@hrientec.com">
                </div>
                <button onclick="register()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all mt-4">
                    <i class="fas fa-check-circle mr-2"></i> ลงทะเบียนสวมสิทธิ์
                </button>
            </div>
        </div>

        <!-- Section 1: Approval Card -->
        <div id="approvalSection" class="hidden space-y-4">
            <div id="taskContent" class="space-y-4">
                <!-- รายการจะถูกแทรกที่นี่ -->
            </div>
            
            <div id="noTask" class="hidden text-center py-24">
                <div class="bg-green-50 text-green-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-100">
                    <i class="fas fa-clipboard-check text-4xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800">ไม่มีรายการค้างอนุมัติ</h3>
                <p class="text-gray-400 text-sm">คุณได้จัดการรายการทั้งหมดเรียบร้อยแล้ว</p>
                <button onclick="fetchTask()" class="mt-8 bg-blue-600 text-white px-8 py-2.5 rounded-full font-bold shadow-md active:scale-95 transition">
                    <i class="fas fa-sync-alt mr-2"></i> ตรวจสอบอีกครั้ง
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKMwydsv1JPPjN0SNWKsWg3FFnmFuIMppjbJG_F75ssy49WHFcyKqGQE2RFyyLtzPs/exec'; 
        const LIFF_ID = '2009016720-UwO1laLB'; 
        
        let currentUser = {
            lineUid: '',
            displayName: '',
            approverName: ''
        };

        async function init() {
            showLoading(true);
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                currentUser.lineUid = profile.userId;
                currentUser.displayName = profile.displayName;
                if(profile.pictureUrl) document.getElementById('userImg').src = profile.pictureUrl;

                await checkUser();
            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'การเชื่อมต่อขัดข้อง: ' + err, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function checkUser() {
            const res = await callApi({ action: 'checkUser', lineUid: currentUser.lineUid });
            if (res.status === 'found') {
                currentUser.approverName = res.approverName;
                document.getElementById('approverDisplay').innerText = `ผู้อนุมัติ: ${res.approverName}`;
                document.getElementById('regSection').classList.add('hidden');
                document.getElementById('approvalSection').classList.remove('hidden');
                fetchTask();
            } else {
                document.getElementById('regSection').classList.remove('hidden');
            }
        }

        async function register() {
            const pass = document.getElementById('regPass').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            if (!pass || !email) return Swal.fire('เตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'warning');

            showLoading(true);
            const res = await callApi({
                action: 'register',
                lineUid: currentUser.lineUid,
                password: pass,
                email: email,
                displayName: currentUser.displayName
            });
            showLoading(false);

            if (res.status === 'success') {
                Swal.fire({
                    icon: 'success',
                    title: 'สวมสิทธิ์สำเร็จ',
                    text: `เข้าใช้งานในชื่อคุณ ${res.approverName}`,
                    timer: 2000,
                    showConfirmButton: false
                }).then(checkUser);
            } else {
                Swal.fire('ล้มเหลว', res.message || 'รหัสผ่านไม่ถูกต้อง', 'error');
            }
        }

        async function fetchTask() {
            showLoading(true);
            const res = await callApi({ action: 'getPendingTask', approverName: currentUser.approverName });
            showLoading(false);

            const container = document.getElementById('taskContent');
            const emptyState = document.getElementById('noTask');
            
            if (res.status === 'success' && res.data) {
                container.classList.remove('hidden');
                emptyState.classList.add('hidden');
                renderTask(res.data);
            } else {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

        function renderTask(task) {
            const container = document.getElementById('taskContent');
            
            let itemsHtml = task.details.map((item, idx) => {
                // ใช้ sz=w600 เพื่อให้ภาพพรีวิวชัดเจนขึ้น และใช้ object-contain เพื่อแสดงครบทั้งภาพ
                const thumbUrl = item.photoId ? `https://drive.google.com/thumbnail?id=${item.photoId}&sz=w600` : '';
                
                return `
                <div class="p-3 bg-white rounded-xl border border-gray-100 shadow-sm space-y-3">
                    <div class="flex items-center space-x-3">
                        <div class="bg-blue-700 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold text-xs flex-shrink-0">
                            ${item.qty}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-gray-800 leading-tight">${item.description}</p>
                            <p class="text-[9px] text-gray-400 font-semibold uppercase tracking-wider">Owner: ${item.owner}</p>
                        </div>
                    </div>
                    ${item.photoId ? `
                        <div class="relative w-full h-56 bg-gray-100 rounded-lg overflow-hidden border border-gray-100">
                            <img src="${thumbUrl}" 
                                 class="img-contain" 
                                 onclick="previewFullImage('${item.photoId}')"
                                 onerror="this.src='https://via.placeholder.com/400x300?text=ไม่มีรูปภาพ'">
                            <div class="absolute bottom-2 right-2 bg-black/50 text-white px-2 py-1 rounded-md text-[9px] backdrop-blur-sm">
                                <i class="fas fa-expand-alt mr-1"></i> ดูภาพขนาดเต็ม
                            </div>
                        </div>
                    ` : `
                        <div class="py-6 bg-gray-50 rounded-lg text-center border border-dashed border-gray-200">
                            <i class="fas fa-camera-slash text-gray-300 text-xl mb-1"></i>
                            <p class="text-[10px] text-gray-400">ไม่มีรูปภาพประกอบ</p>
                        </div>
                    `}
                </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="task-card bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                    <div class="bg-blue-900 p-4 text-white">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] bg-white/20 px-2 py-0.5 rounded font-mono">#${task.docno}</span>
                            <span class="text-[10px]"><i class="far fa-clock mr-1"></i>${task.docdate}</span>
                        </div>
                        <h2 class="text-lg font-bold leading-tight">${task.transType}</h2>
                    </div>
                    
                    <div class="p-4 space-y-5">
                        <div class="grid grid-cols-2 gap-x-4 gap-y-4 text-sm">
                            <div><label class="text-gray-400 text-[9px] font-bold block mb-0.5 uppercase tracking-tighter">ผู้ขออนุญาต</label><p class="font-bold text-gray-800">${task.reqName}</p></div>
                            <div><label class="text-gray-400 text-[9px] font-bold block mb-0.5 uppercase tracking-tighter">แผนก/หน่วยงาน</label><p class="font-bold text-gray-800">${task.reqCompany}</p></div>
                            <div><label class="text-gray-400 text-[9px] font-bold block mb-0.5 uppercase tracking-tighter">ทะเบียนรถ</label><p class="font-bold text-gray-800">${task.carNo}</p></div>
                            <div><label class="text-gray-400 text-[9px] font-bold block mb-0.5 uppercase tracking-tighter">ประเภทรถ</label><p class="font-bold text-gray-800">${task.carType}</p></div>
                            <div class="col-span-2 bg-blue-50/50 p-3 rounded-xl border border-blue-100/50">
                                <label class="text-blue-400 text-[9px] font-bold block mb-1 uppercase tracking-tighter">วัตถุประสงค์การเคลื่อนย้าย</label>
                                <p class="text-gray-700 text-sm leading-snug font-medium">${task.purpose}</p>
                            </div>
                        </div>
                        
                        <div>
                            <h4 class="text-xs font-black text-blue-900 mb-3 uppercase flex items-center tracking-widest">
                                <i class="fas fa-layer-group mr-2"></i> รายการสิ่งของ (${task.details.length})
                            </h4>
                            <div class="space-y-4">${itemsHtml}</div>
                        </div>
                    </div>
                    
                    <div class="p-4 bg-gray-50 border-t grid grid-cols-2 gap-3">
                        <button onclick="approveAction('${task.docno}', 'Rejected')" class="bg-white border-2 border-red-500 text-red-600 font-bold py-4 rounded-xl active:scale-95 transition-all text-sm">
                            <i class="fas fa-times mr-1"></i> ไม่อนุมัติ
                        </button>
                        <button onclick="approveAction('${task.docno}', 'Approved')" class="bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all text-sm">
                            <i class="fas fa-check mr-1"></i> อนุมัติ
                        </button>
                    </div>
                </div>
            `;
        }

        // ปรับปรุงฟังก์ชันขยายรูปภาพให้เรียกไฟล์ตรงและแสดงผลแบบ Popup
        function previewFullImage(id) {
            const fullUrl = `https://drive.google.com/uc?id=${id}`;
            Swal.fire({
                html: `<div class="p-0 overflow-hidden rounded-lg">
                         <img src="${fullUrl}" style="max-width:100%; height:auto; border-radius:8px;" onerror="this.src='https://via.placeholder.com/800x600?text=Error+Loading+Image'">
                         <div class="mt-4 flex justify-center">
                            <a href="${fullUrl}" target="_blank" class="text-xs text-blue-500 underline"><i class="fas fa-external-link-alt mr-1"></i>เปิดในหน้าต่างใหม่</a>
                         </div>
                       </div>`,
                showConfirmButton: false,
                showCloseButton: true,
                width: '95%',
                background: '#fff',
                padding: '10px'
            });
        }

        async function approveAction(docno, status) {
            const isApproved = status === 'Approved';
            const result = await Swal.fire({
                title: isApproved ? 'ยืนยันอนุมัติ?' : 'ปฏิเสธคำขอ?',
                text: `คุณกำลังตัดสินใจ ${isApproved ? 'อนุมัติ' : 'ไม่อนุมัติ'} รายการ ${docno}`,
                icon: isApproved ? 'question' : 'warning',
                showCancelButton: true,
                confirmButtonColor: isApproved ? '#059669' : '#dc2626',
                cancelButtonText: 'ยกเลิก',
                confirmButtonText: 'ยืนยันดำเนินการ',
                reverseButtons: true
            });

            if (result.isConfirmed) {
                showLoading(true);
                const res = await callApi({ action: 'processApproval', docno, status });
                showLoading(false);
                if (res.status === 'success') {
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'บันทึกสำเร็จ', 
                        showConfirmButton: false, 
                        timer: 1000,
                        toast: true,
                        position: 'top-end'
                    });
                    fetchTask();
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', res.message || 'บันทึกไม่สำเร็จ', 'error');
                }
            }
        }

        async function callApi(payload) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                console.error(err);
                return { status: 'error', message: 'การเชื่อมต่อเซิร์ฟเวอร์ล้มเหลว' };
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
