<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบอนุมัติ - Property Pass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mb-4"></div>
        <p class="text-gray-600">กำลังประมวลผล...</p>
    </div>

    <header class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-bold text-lg">ระบบอนุมัติย้ายสิ่งของ</h1>
                <p id="approverDisplay" class="text-xs opacity-80">รอเข้าสู่ระบบ...</p>
            </div>
            <img id="userImg" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" src="https://via.placeholder.com/40">
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- Section 0: Registration Form -->
        <div id="regSection" class="hidden bg-white rounded-2xl shadow-xl p-6 mt-10">
            <div class="text-center mb-6">
                <i class="fas fa-user-shield text-5xl text-blue-600 mb-4"></i>
                <h2 class="text-xl font-bold">ลงทะเบียนผู้อนุมัติ</h2>
                <p class="text-gray-500 text-sm">กรุณาระบุรหัสผ่านและอีเมลเพื่อเริ่มใช้งาน</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">รหัสผ่าน (จากระบบเดิม)</label>
                    <input type="password" id="regPass" class="w-full p-3 border rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="ป้อนรหัสผ่าน">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">อีเมลสำหรับแจ้งเตือน</label>
                    <input type="email" id="regEmail" class="w-full p-3 border rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="example@email.com">
                </div>
                <button onclick="register()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-blue-700 transition">ลงทะเบียนสวมสิทธิ์</button>
            </div>
        </div>

        <!-- Section 1: Approval Card -->
        <div id="approvalSection" class="hidden space-y-4">
            <div id="taskContent" class="space-y-4">
                <!-- Data will be injected here -->
            </div>
            
            <div id="noTask" class="hidden text-center py-20">
                <div class="bg-green-100 text-green-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-check-double text-3xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800">ไม่มีรายการรออนุมัติ</h3>
                <p class="text-gray-500">คุณได้ตรวจสอบครบทุกรายการแล้ว</p>
                <button onclick="fetchTask()" class="mt-4 text-blue-600 font-semibold underline">รีเฟรชข้อมูล</button>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const GAS_URL = 'YOUR_GAS_WEB_APP_URL'; // วาง URL ที่ได้จาก Deploy GAS
        const LIFF_ID = 'YOUR_LIFF_ID';         // วาง LIFF ID ของคุณ
        
        let currentUser = {
            lineUid: '',
            displayName: '',
            approverName: ''
        };

        async function init() {
            showLoading(true);
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                currentUser.lineUid = profile.userId;
                currentUser.displayName = profile.displayName;
                document.getElementById('userImg').src = profile.pictureUrl;

                await checkUser();
            } catch (err) {
                Swal.fire('Error', 'LIFF Init Failed: ' + err, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function checkUser() {
            const res = await callApi({ action: 'checkUser', lineUid: currentUser.lineUid });
            if (res.status === 'found') {
                currentUser.approverName = res.approverName;
                document.getElementById('approverDisplay').innerText = `คุณ: ${res.approverName}`;
                document.getElementById('regSection').classList.add('hidden');
                document.getElementById('approvalSection').classList.remove('hidden');
                fetchTask();
            } else {
                document.getElementById('regSection').classList.remove('hidden');
            }
        }

        async function register() {
            const pass = document.getElementById('regPass').value;
            const email = document.getElementById('regEmail').value;
            if (!pass || !email) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');

            showLoading(true);
            const res = await callApi({
                action: 'register',
                lineUid: currentUser.lineUid,
                password: pass,
                email: email,
                displayName: currentUser.displayName
            });
            showLoading(false);

            if (res.status === 'success') {
                Swal.fire('สำเร็จ', 'ลงทะเบียนสวมสิทธิ์เรียบร้อย', 'success').then(checkUser);
            } else {
                Swal.fire('ล้มเหลว', res.message, 'error');
            }
        }

        async function fetchTask() {
            showLoading(true);
            const res = await callApi({ action: 'getPendingTask', approverName: currentUser.approverName });
            showLoading(false);

            const container = document.getElementById('taskContent');
            const emptyState = document.getElementById('noTask');
            
            if (res.status === 'success' && res.data) {
                container.classList.remove('hidden');
                emptyState.classList.add('hidden');
                renderTask(res.data);
            } else {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

        function renderTask(task) {
            const container = document.getElementById('taskContent');
            let itemsHtml = task.details.map(item => `
                <div class="flex items-center space-x-3 p-3 bg-gray-50 rounded-lg border border-gray-100">
                    <div class="bg-blue-100 text-blue-600 w-10 h-10 rounded-lg flex items-center justify-center font-bold">
                        ${item.qty}
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-semibold">${item.description}</p>
                        <p class="text-[10px] text-gray-500">เจ้าของ: ${item.owner}</p>
                    </div>
                    ${item.photoId ? `<i class="fas fa-image text-gray-400"></i>` : ''}
                </div>
            `).join('');

            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-200">
                    <div class="bg-blue-600 p-4 text-white">
                        <div class="flex justify-between items-center">
                            <span class="text-xs bg-blue-500 px-2 py-1 rounded">เลขที่: ${task.docno}</span>
                            <span class="text-xs">${task.docdate}</span>
                        </div>
                    </div>
                    <div class="p-4 space-y-4">
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div class="col-span-2"><label class="text-gray-500 text-[10px] uppercase font-bold">ประเภท</label><p>${task.transType}</p></div>
                            <div><label class="text-gray-500 text-[10px] uppercase font-bold">ผู้ขอ</label><p>${task.reqName}</p></div>
                            <div><label class="text-gray-500 text-[10px] uppercase font-bold">แผนก</label><p>${task.reqCompany}</p></div>
                            <div><label class="text-gray-500 text-[10px] uppercase font-bold">ทะเบียนรถ</label><p>${task.carNo}</p></div>
                            <div><label class="text-gray-500 text-[10px] uppercase font-bold">ประเภทรถ</label><p>${task.carType}</p></div>
                            <div class="col-span-2"><label class="text-gray-500 text-[10px] uppercase font-bold">วัตถุประสงค์</label><p>${task.purpose}</p></div>
                        </div>
                        
                        <div class="border-t pt-4">
                            <h4 class="text-xs font-bold text-gray-400 mb-2 uppercase">รายการทรัพย์สิน</h4>
                            <div class="space-y-2">${itemsHtml}</div>
                        </div>
                    </div>
                    
                    <div class="p-4 bg-gray-50 border-t flex space-x-3">
                        <button onclick="approveAction('${task.docno}', 'Rejected')" class="flex-1 bg-white border-2 border-red-500 text-red-500 font-bold py-3 rounded-xl active:scale-95 transition">ไม่อนุมัติ</button>
                        <button onclick="approveAction('${task.docno}', 'Approved')" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition">อนุมัติรายการ</button>
                    </div>
                </div>
            `;
        }

        async function approveAction(docno, status) {
            const confirmText = status === 'Approved' ? 'ยืนยันการอนุมัติ?' : 'ยืนยันการปฏิเสธ?';
            const result = await Swal.fire({
                title: 'ยืนยันรายการ',
                text: confirmText,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: status === 'Approved' ? '#059669' : '#dc2626'
            });

            if (result.isConfirmed) {
                showLoading(true);
                const res = await callApi({ action: 'processApproval', docno, status });
                showLoading(false);
                if (res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'บันทึกเรียบร้อย', showConfirmButton: false, timer: 1000 });
                    fetchTask(); // วนไปหาคิวถัดไป
                }
            }
        }

        async function callApi(payload) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                return { status: 'error', message: err.toString() };
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
